<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Простой стиль, чтобы кнопки выглядели прилично и были темными */
        body {
            font-family: sans-serif;
            background-color: #1c1c1d;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; }
        button {
            width: 80%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            background-color: #248bcf; /* Цвет Telegram */
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:active {
            background-color: #1a6b9e; /* Цвет при нажатии */
        }
        .btn-scr { background-color: #31b54a; } /* Зеленая для скриншота */
        .btn-vol-down { background-color: #fca311; } /* Оранжевая */
    </style>
</head>
<body>

    <h1>Управление ПК</h1>

    <button class="btn-scr" onclick="sendDataToBot('screenshot')">📸 Скриншот</button>
    <button onclick="sendDataToBot('volume_up')">🔊 Громче</button>
    <button class="btn-vol-down" onclick="sendDataToBot('volume_down')">🔉 Тише</button>

    <script>
        // Инициализируем объект Telegram WebApp
        const tg = window.Telegram.WebApp;

        // Сообщаем Telegram, что приложение готово и его можно показать
        tg.ready();
        // Разворачиваем приложение на всю высоту
        tg.expand();

        // Функция, которая срабатывает при нажатии на кнопку
        function sendDataToBot(command) {
            // Самая главная функция: отправляет текст обратно боту
            tg.sendData(command);
            
            // Опционально: закрыть Mini App после нажатия
            // tg.close(); 
        }
    </script>
</body>
</html>
