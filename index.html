<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PC Remote Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1c1c1d;
            --button-blue: #248bcf;
            --button-red: #eb4d4b;
            --button-green: #6ab04c;
            --text-color: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #aaa;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: none;
            border-radius: 12px;
            background-color: var(--button-blue);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        .btn-scr { background-color: var(--button-green); }
        .btn-shutdown { 
            background-color: transparent; 
            border: 2px solid var(--button-red);
            color: var(--button-red);
            margin-top: 20px;
        }

        .status-text {
            font-size: 0.8rem;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Управление ПК</h1>

    <div class="container">
        <button class="btn-scr" onclick="sendCmd('screenshot')">
            📸 Сделать скриншот
        </button>
        
        <button onclick="sendCmd('volume_up')">
            🔊 Прибавить звук
        </button>
        
        <button onclick="sendCmd('volume_down')">
            🔉 Убавить звук
        </button>

        <button class="btn-shutdown" onclick="sendCmd('shutdown')">
            🔌 Выключить компьютер
        </button>
    </div>

    <p class="status-text">Бот должен быть запущен на ПК</p>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        
        // Сообщаем Telegram, что приложение готово
        tg.ready();
        // Разворачиваем на весь экран
        tg.expand();

        // Настройка цветов темы из Telegram (автоматически)
        document.body.style.backgroundColor = tg.backgroundColor || '#1c1c1d';

        function sendCmd(command) {
            // Легкая вибрация при нажатии (Haptic Feedback)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            // ОТПРАВКА ДАННЫХ БОТУ
            // Важно: tg.sendData работает только если Mini App 
            // открыт через Menu Button (синяя кнопка слева от ввода)
            tg.sendData(command);
            
            // Закрываем окно после отправки (по желанию)
            // tg.close();
        }
    </script>
</body>
</html>
